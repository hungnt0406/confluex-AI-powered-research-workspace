#:schema https://developers.openai.com/codex/config-schema.json

# Everything Claude Code (ECC) — Codex Reference Configuration
#
# Copy this file to ~/.codex/config.toml for global defaults, or keep it in
# the project root as .codex/config.toml for project-local settings.
#
# Official docs:
# - https://developers.openai.com/codex/config-reference
# - https://developers.openai.com/codex/multi-agent

# Model selection
# Leave `model` and `model_provider` unset so Codex CLI uses its current
# built-in defaults. Uncomment and pin them only if you intentionally want
# repo-local or global model overrides.

# Top-level runtime settings (current Codex schema)
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

# External notifications receive a JSON payload on stdin.
notify = [
  "terminal-notifier",
  "-title", "Codex ECC",
  "-message", "Task completed!",
  "-sound", "default",
]

# Persistent instructions are appended to every prompt (additive, unlike
# model_instructions_file which replaces AGENTS.md).
persistent_instructions = "Follow project AGENTS.md guidelines. MCP servers are opt-in; use them only when the user explicitly asks and the matching server is enabled."

# model_instructions_file replaces built-in instructions instead of AGENTS.md,
# so leave it unset unless you intentionally want a single override file.
# model_instructions_file = "/absolute/path/to/instructions.md"

# MCP servers are disabled by default so new Codex chats start without loading
# every MCP process. Uncomment only the server you want for a specific session.
#
# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# startup_timeout_sec = 30
#
# [mcp_servers.context7]
# command = "npx"
# Canonical Codex section name is `context7`; the package itself remains
# `@upstash/context7-mcp`.
# args = ["-y", "@upstash/context7-mcp@latest"]
# startup_timeout_sec = 30
#
# [mcp_servers.exa]
# url = "https://mcp.exa.ai/mcp"
#
# [mcp_servers.memory]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-memory"]
# startup_timeout_sec = 30
#
# [mcp_servers.playwright]
# command = "npx"
# args = ["-y", "@playwright/mcp@latest", "--extension"]
# startup_timeout_sec = 30
#
# [mcp_servers.sequential-thinking]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
# startup_timeout_sec = 30
#
# Additional MCP server templates:
# [mcp_servers.supabase]
# command = "npx"
# args = ["-y", "supabase-mcp-server@latest", "--read-only"]
#
# [mcp_servers.firecrawl]
# command = "npx"
# args = ["-y", "firecrawl-mcp"]
#
# [mcp_servers.fal-ai]
# command = "npx"
# args = ["-y", "fal-ai-mcp-server"]
#
# [mcp_servers.cloudflare]
# command = "npx"
# args = ["-y", "@cloudflare/mcp-server-cloudflare"]

[features]
# Codex multi-agent collaboration is stable and on by default in current builds.
# Keep the explicit toggle here so the repo documents its expectation clearly.
multi_agent = true

# Profiles — switch with `codex -p <name>`
[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
# Multi-agent role limits and local role definitions.
# These map to `.codex/agents/*.toml` and mirror the repo's explorer/reviewer/docs workflow.
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
config_file = "agents/docs-researcher.toml"

[agents.external_researcher]
description = "External web and docs researcher for quick lookups and deeper cited research."
config_file = "agents/external-researcher.toml"

# Backend development team
[agents.backend_implementer]
description = "Backend implementation owner for API, service, DB, and pipeline changes."
config_file = "agents/backend-implementer.toml"

[agents.backend_reviewer]
description = "Backend reviewer focused on correctness, security, migrations, API contracts, and tests."
config_file = "agents/backend-reviewer.toml"

# Frontend development team
[agents.frontend_architect]
description = "Frontend architecture owner for routes, layouts, component hierarchy, and design-system decisions."
config_file = "agents/frontend-architect.toml"

[agents.frontend_implementer]
description = "Frontend implementation owner for pages, components, styling, state, and API integration."
config_file = "agents/frontend-implementer.toml"

[agents.frontend_ux_reviewer]
description = "Frontend reviewer focused on UX quality, accessibility, responsiveness, and behavioral regressions."
config_file = "agents/frontend-ux-reviewer.toml"

[agents.frontend_qa_tester]
description = "Frontend QA tester focused on regression coverage, E2E flows, accessibility checks, and frontend verification."
config_file = "agents/frontend-qa-tester.toml"
