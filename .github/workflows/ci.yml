name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: literature_review
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ANTHROPIC_API_KEY: test-anthropic-key
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/literature_review
      JWT_SECRET_KEY: ci-secret-key
      SEMANTIC_SCHOLAR_API_KEY: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy backend/

      - name: Run tests
        run: uv run pytest tests/ -x
